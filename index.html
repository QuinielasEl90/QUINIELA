<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinielas El 90</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#f1f5f9;
    font-family:'Roboto',sans-serif;
    padding:5px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:650px;
    border:1px solid #cbd5e1;
    background:#ffffff;
    box-shadow:0 6px 12px rgba(0,0,0,0.15);
    overflow:hidden;
}

/* ================= HEADER ================= */

header{
    position:relative;
    background:linear-gradient(
        90deg,
        #001f54 0%,
        #003b8e 35%,
        #0b63ce 65%,
        #d4af37 100%
    );
    color:#ffffff;
    text-align:center;
    padding:22px 15px;
    border-bottom:4px solid #d4af37;
}

.header-title{
    font-family:'Trebuchet MS',sans-serif;
    font-size:1.9rem;
    font-weight:900;
    letter-spacing:2px;
    color:#ffffff;
    text-shadow:
        0 0 5px rgba(0,0,0,0.6),
        2px 2px 4px rgba(0,0,0,0.7);
}

.header-subtitle{
    color:#ffe082;
    font-size:0.9rem;
    font-weight:bold;
    margin-top:4px;
    letter-spacing:1px;
}

.logo-superior{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    width:58px;
    height:58px;
    object-fit:contain;
    border-radius:50%;
    background:#ffffff;
    padding:3px;
}

/* ================= TABLA ================= */

.tabla-contenedor{
    position:relative;
    overflow:hidden;
    background:#ffffff;
}

.tabla-contenedor::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:95%;
    height:95%;
    background:url('LOGO.PNG.jpeg') center center no-repeat;
    background-size:contain;
    opacity:0.80;
    pointer-events:none;
    z-index:1;
}

.tabla-quiniela{
    width:100%;
    border-collapse:collapse;
    position:relative;
    z-index:2;
}

.fila-partido{
    height:32px;
    border-bottom:1px solid rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.30);
}

.col-letra-l,
.col-empate,
.col-letra-v{
    width:48px;
    min-width:48px;
    text-align:center;
    cursor:pointer;
    font-weight:900;
    font-size:0.8rem;
    transition:0.2s;
    border-left:1px solid rgba(255,255,255,0.35);
    border-right:1px solid rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.20);
    color:#000000;
}

.col-letra-l:hover,
.col-empate:hover,
.col-letra-v:hover{
    background:rgba(255,255,255,0.60);
}

.col-equipo-local{
    padding-left:6px;
    font-size:0.78rem;
    font-weight:900;
    border-right:1px solid rgba(255,255,255,0.35);
    color:#001b5e;
}

.col-equipo-visita{
    padding-right:6px;
    text-align:right;
    font-size:0.78rem;
    font-weight:900;
    border-left:1px solid rgba(255,255,255,0.35);
    color:#001b5e;
}

.equipo-con-icono{
    display:flex;
    align-items:center;
    gap:5px;
}

.equipo-visita-icono{
    justify-content:flex-end;
}

.logo-equipo{
    width:18px;
    height:18px;
    object-fit:contain;
}

.selected-cell{
    background:#001f54 !important;
    color:#ffe082 !important;
}

/* ================= BANNERS ================= */

.banner-negro{
    background:linear-gradient(
        90deg,
        #001f54 0%,
        #003b8e 40%,
        #0b63ce 75%,
        #d4af37 100%
    );
    color:#ffffff;
    display:flex;
    justify-content:space-between;
    padding:6px 12px;
    font-size:0.8rem;
    font-weight:bold;
}

.banner-negro span{
    color:#ffe082;
}

.banner-informes{
    text-align:center;
    padding:6px;
    font-size:1rem;
    font-weight:bold;
}

.banner-facebook{
    background:linear-gradient(
        90deg,
        #001f54 0%,
        #003b8e 45%,
        #0b63ce 75%,
        #d4af37 100%
    );
    color:#ffffff;
    text-align:center;
    padding:7px;
    font-size:0.95rem;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.logo-facebook{
    width:22px;
    height:22px;
    object-fit:contain;
}

.banner-total{
    text-align:center;
    padding:5px;
    font-size:1.1rem;
    font-weight:bold;
    color:#001f54;
}

/* ================= INPUTS ================= */

.seccion-inputs{
    padding:10px;
}

.input-nombre{
    width:100%;
    padding:8px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    text-align:center;
    font-weight:bold;
    margin-bottom:6px;
}

.bloque-botones-triples{
    display:flex;
    gap:5px;
    margin-bottom:6px;
}

.btn-accion{
    flex:1;
    border:none;
    padding:8px;
    color:#ffffff;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
}

.btn-rojo{
    background:#001f54;
}

.btn-azul{
    background:#0b63ce;
}

.btn-gris{
    background:#d4af37;
    color:#001f54;
}

#mensajeJugadas{
    margin-top:5px;
    margin-bottom:5px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    padding:6px;
    text-align:center;
    font-weight:bold;
    min-height:35px;
    background:#f8fafc;
    font-size:0.9rem;
}

.btn-whatsapp-enviar{
    width:100%;
    background:#25d366;
    border:none;
    color:#ffffff;
    padding:11px;
    font-size:1rem;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<header>

<div class="header-title">
QUINIELAS EL 90
</div>

<div class="header-subtitle">
QUINIELA DE LA SEMANA
</div>

<img src="LOGO.PNG.jpeg" class="logo-superior">

</header>

<div class="tabla-contenedor">

<table class="tabla-quiniela">
<tbody id="cuerpoTabla"></tbody>
</table>

</div>

<div class="banner-negro">
<div>PRECIO: <span>$30.00</span></div>
<div>CIERRE: <span>JUEVES 11:00 P. M.</span></div>
</div>

<div class="banner-informes">
INFORMES: +52 4439000088
</div>

<div class="banner-facebook">
<img src="facebook.png" class="logo-facebook">
<span>QUINIELAS EL 90</span>
</div>

<div class="banner-total" id="bannerTotalPrecio">
TOTAL: $0.00
</div>

<div class="seccion-inputs">

<input
type="text"
id="nombreParticipante"
class="input-nombre"
placeholder="NOMBRE DEL PARTICIPANTE"
>

<div class="bloque-botones-triples">

<button class="btn-accion btn-rojo" onclick="limpiarTodo()">
REINICIAR
</button>

<button class="btn-accion btn-azul" onclick="agregarJugada()">
AGREGAR
</button>

<button class="btn-accion btn-gris" onclick="seleccionAleatoria()">
ALEATORIO
</button>

</div>

<div id="mensajeJugadas">Aún no has agregado ninguna jugada.</div>

<button class="btn-whatsapp-enviar" onclick="enviarWhatsApp()">
ENVIAR JUGADA(S)
</button>

</div>

</div>

<script>

const partidosData = [
    {id:1, local:"INDEPENDIENTE DEL VALLE", logoLocal:"independientedelvalle.png", visita:"ROSARIO CENTRAL", logoVisita:"rosariocentral.png"},
    {id:2, local:"CORINTHIANS", logoLocal:"corinthians.png", visita:"PLATENSE", logoVisita:"platense.png"},
    {id:3, local:"RIVER PLATE", logoLocal:"riverplate.png", visita:"BLOOMING", logoVisita:"blooming.png"},
    {id:4, local:"PALMEIRAS", logoLocal:"palmeiras.png", visita:"JUNIOR", logoVisita:"junior.png"},
    {id:5, local:"BOCA JUNIORS", logoLocal:"bocajuniors.png", visita:"UNIVERSIDAD CATÓLICA", logoVisita:"universidadcatolica.png"},
    {id:6, local:"EGIPTO", logoLocal:"egipto.png", visita:"RUSIA", logoVisita:"rusia.png"},
    {id:7, local:"SUDÁFRICA", logoLocal:"sudafrica.png", visita:"NICARAGUA", logoVisita:"nicaragua.png"},
    {id:8, local:"BOSNIA", logoLocal:"bosnia.png", visita:"MACEDONIA DEL NORTE", logoVisita:"macedoniadelnorte.png"}
];

const PRECIO_QUINIELA = 30;
const respuestasActuales = {};
const listaJugadasAgregadas = [];

function inicializarTabla(){
    const tabla = document.getElementById('cuerpoTabla');
    tabla.innerHTML = ""; 

    partidosData.forEach(p=>{
        const fila = document.createElement('tr');
        fila.className = 'fila-partido';
        fila.innerHTML = `
            <td class="col-letra-l" onclick="marcarCelda(${p.id}, 'L')" id="cell-L-${p.id}">L</td>
            <td class="col-equipo-local">
                <div class="equipo-con-icono">
                    <img src="${p.logoLocal}" class="logo-equipo">
                    <span>${p.local}</span>
                </div>
            </td>
            <td class="col-empate" onclick="marcarCelda(${p.id}, 'E')" id="cell-E-${p.id}">E</td>
            <td class="col-equipo-visita">
                <div class="equipo-con-icono equipo-visita-icono">
                    <span>${p.visita}</span>
                    <img src="${p.logoVisita}" class="logo-equipo">
                </div>
            </td>
            <td class="col-letra-v" onclick="marcarCelda(${p.id}, 'V')" id="cell-V-${p.id}">V</td>
        `;
        tabla.appendChild(fila);
    });
    actualizarInterfazPrecios();
}

function marcarCelda(id, opcion){
    const cellL = document.getElementById(`cell-L-${id}`);
    const cellE = document.getElementById(`cell-E-${id}`);
    const cellV = document.getElementById(`cell-V-${id}`);

    if(respuestasActuales[id] === opcion){
        cellL.classList.remove('selected-cell');
        cellE.classList.remove('selected-cell');
        cellV.classList.remove('selected-cell');
        delete respuestasActuales[id];
        return;
    }

    cellL.classList.remove('selected-cell');
    cellE.classList.remove('selected-cell');
    cellV.classList.remove('selected-cell');

    if(opcion === 'L') cellL.classList.add('selected-cell');
    if(opcion === 'E') cellE.classList.add('selected-cell');
    if(opcion === 'V') cellV.classList.add('selected-cell');

    respuestasActuales[id] = opcion;
}

function limpiarTablaSolo(){
    Object.keys(respuestasActuales).forEach(id=>{
        document.getElementById(`cell-L-${id}`)?.classList.remove('selected-cell');
        document.getElementById(`cell-E-${id}`)?.classList.remove('selected-cell');
        document.getElementById(`cell-V-${id}`)?.classList.remove('selected-cell');
        delete respuestasActuales[id];
    });
}

function limpiarTodo(){
    limpiarTablaSolo();
    listaJugadasAgregadas.length = 0;
    document.getElementById('nombreParticipante').value = '';
    document.getElementById('mensajeJugadas').innerHTML = 'Aún no has agregado ninguna jugada.';
    actualizarInterfazPrecios();
}

function validarFormulario(){
    const nombre = document.getElementById('nombreParticipante').value.trim();

    if(nombre === ''){
        alert('⚠️ QUINIELA SIN NOMBRE. POR FAVOR, INGRESA TU NOMBRE ANTES DE CONTINUAR.');
        return false;
    }

    let faltanPartidos = false;
    partidosData.forEach(p=>{
        if(!respuestasActuales[p.id]){
            faltanPartidos = true;
        }
    });

    if(faltanPartidos){
        alert('⚠️ QUINIELA INCOMPLETA. DEBES MARCAR UNA OPCIÓN EN CADA PARTIDO.');
        return false;
    }

    return true;
}

function actualizarInterfazPrecios(){
    const totalDinero = listaJugadasAgregadas.length * PRECIO_QUINIELA;
    document.getElementById('bannerTotalPrecio').innerHTML = `TOTAL: $${totalDinero.toFixed(2)}`;
}

function agregarJugada(){
    if(!validarFormulario()){
        return;
    }

    let cadenaJugada = '';
    partidosData.forEach(p=>{
        cadenaJugada += respuestasActuales[p.id] + ' ';
    });

    listaJugadasAgregadas.push(cadenaJugada.trim());

    let listadoHTML = `✅ QUINIELAS AGREGADAS (${listaJugadasAgregadas.length}):<br><br>`;
    listaJugadasAgregadas.forEach((jg, index) => {
        listadoHTML += `<b>#${index + 1}:</b> ${jg}<br>`;
    });
    
    document.getElementById('mensajeJugadas').innerHTML = listadoHTML;

    limpiarTablaSolo();
    actualizarInterfazPrecios();
    alert('👍 ¡Jugada añadida al carrito! Puedes rellenar el tablero otra vez para mandar más de una quiniela.');
}

function seleccionAleatoria(){
    const opciones = ['L','E','V'];
    partidosData.forEach(p=>{
        const random = opciones[Math.floor(Math.random()*3)];
        const cellL = document.getElementById(`cell-L-${p.id}`);
        const cellE = document.getElementById(`cell-E-${p.id}`);
        const cellV = document.getElementById(`cell-V-${p.id}`);

        cellL.classList.remove('selected-cell');
        cellE.classList.remove('selected-cell');
        cellV.classList.remove('selected-cell');

        marcarCelda(p.id, random);
    });
}

function enviarWhatsApp(){
    const nombre = document.getElementById('nombreParticipante').value.trim();

    if(nombre === ''){
        alert('⚠️ ESCRIBE TU NOMBRE PARA SABER QUIÉN ENVÍA.');
        return;
    }

    if(listaJugadasAgregadas.length === 0){
        alert('⚠️ NO HAS AGREGADO NINGUNA JUGADA. SELECCIONA TUS CASILLAS Y DA CLIC EN EL BOTÓN "AGREGAR" PRIMERO.');
        return;
    }

    const totalPagar = listaJugadasAgregadas.length * PRECIO_QUINIELA;

    let bloqueJugadasMensaje = '';
    listaJugadasAgregadas.forEach((jg, index) => {
        bloqueJugadasMensaje += `Quiniela #${index + 1}:\n${jg}\n\n`;
    });

    const mensaje = `
🏆 QUINIELAS EL 90 🏆

👤 Nombre:
${nombre}

📋 Jugadas registradas (${listaJugadasAgregadas.length}):
${bloqueJugadasMensaje.trim()}

💰 Total a pagar:
$${totalPagar.toFixed(2)} MXN

📸 *Nota importante:* Por favor adjunta la captura o foto de tu comprobante de pago justo debajo de este mensaje para validar tu registro. ¡Muchas gracias y éxito! 🍀
`;

    const numero = '524439000088';
    const url = `https://api.whatsapp.com/send?phone=${numero}&text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');
}

if(window.location.search){
    window.history.replaceState({}, document.title, window.location.pathname);
}

window.onload = inicializarTabla;

</script>

</body>
</html>
