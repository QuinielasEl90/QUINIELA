<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinielas El 90</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#ffffff;
    font-family:'Roboto',sans-serif;
    padding:4px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:630px;
    border:1px solid #cbd5e1;
    background:#ffffff;
    box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

header{
    background:#0b2240;
    color:#ffffff;
    text-align:center;
    padding:5px 10px;
    position:relative;
    border-bottom:2px solid #d4af37;
}

.header-title{
    font-size:1.4rem;
    font-weight:900;
    letter-spacing:1px;
}

.header-subtitle{
    color:#d4af37;
    font-size:0.75rem;
    font-weight:bold;
    margin-top:2px;
}

.tabla-contenedor{
    position:relative;
    background:linear-gradient(
        135deg,
        rgba(11,34,64,0.03),
        rgba(212,175,55,0.05)
    );
}

.tabla-quiniela{
    width:100%;
    border-collapse:collapse;
}

.fecha-cabecera{
    background:#f8fafc;
    text-align:center;
    font-size:0.68rem;
    padding:4px;
    font-weight:bold;
    border-top:1px solid #cbd5e1;
    border-bottom:1px solid #cbd5e1;
}

.fila-partido{
    height:40px;
    border-bottom:1px solid #cbd5e1;
}

.col-letra-l,
.col-empate,
.col-letra-v{
    width:60px;
    min-width:60px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.col-letra-l:hover,
.col-empate:hover,
.col-letra-v:hover{
    background:#e2e8f0;
}

.col-equipo-local{
    padding-left:6px;
    font-size:0.92rem;
    font-weight:bold;
}

.col-equipo-visita{
    padding-right:6px;
    text-align:right;
    font-size:0.92rem;
    font-weight:bold;
}

.equipo-con-icono{
    display:flex;
    align-items:center;
    gap:5px;
}

.equipo-visita-icono{
    justify-content:flex-end;
}

.selected-cell{
    background:#0b2240 !important;
    color:#d4af37 !important;
}

.banner-negro{
    background:#000000;
    color:#ffffff;
    display:flex;
    justify-content:space-between;
    padding:4px 10px;
    font-size:0.75rem;
    font-weight:bold;
}

.banner-negro span{
    color:#ffcc00;
}

.banner-informes{
    text-align:center;
    padding:4px;
    font-size:1rem;
    font-weight:bold;
}

.banner-facebook{
    background:#0b2240;
    color:#ffffff;
    text-align:center;
    padding:4px;
    font-size:0.75rem;
    font-weight:bold;
}

.banner-total{
    text-align:center;
    padding:4px;
    font-size:1rem;
    font-weight:bold;
}

.seccion-inputs{
    padding:8px;
}

.input-nombre{
    width:100%;
    padding:7px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    text-align:center;
    font-weight:bold;
    margin-bottom:5px;
}

.bloque-botones-triples{
    display:flex;
    gap:5px;
    margin-bottom:5px;
}

.btn-accion{
    flex:1;
    border:none;
    padding:7px;
    color:#ffffff;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
}

.btn-rojo{
    background:#ff0044;
}

.btn-azul{
    background:#257ae6;
}

.btn-gris{
    background:#434950;
}

.desempate-contenedor{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:4px;
    padding:5px;
    text-align:center;
    margin-bottom:5px;
}

.inputs-goles{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:5px;
}

.inputs-goles input{
    width:40px;
    padding:2px;
    text-align:center;
    font-weight:bold;
}

#mensajeJugadas{
    margin-top:5px;
    margin-bottom:5px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    padding:6px;
    text-align:center;
    font-weight:bold;
    min-height:35px;
}

.btn-whatsapp-enviar{
    width:100%;
    background:#25d366;
    border:none;
    color:#ffffff;
    padding:10px;
    font-size:1rem;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<header>

<div class="header-title">
QUINIELAS EL 90
</div>

<div class="header-subtitle">
QUINIELA DE INAUGURACIÓN
</div>

</header>

<div class="tabla-contenedor">

<table class="tabla-quiniela">
<tbody id="cuerpoTabla"></tbody>
</table>

</div>

<div class="banner-negro">
<div>PRECIO: <span>GRATIS</span></div>
<div>CIERRE: <span>JUEVES 11:00 P. M.</span></div>
</div>

<div class="banner-informes">
INFORMES: +52 4439000088
</div>

<div class="banner-facebook">
QUINIELAS EL 90
</div>

<div class="banner-total">
TOTAL: $0.00
</div>

<div class="seccion-inputs">

<input
type="text"
id="nombreParticipante"
class="input-nombre"
placeholder="NOMBRE DEL PARTICIPANTE"
>

<div class="bloque-botones-triples">

<button class="btn-accion btn-rojo" onclick="limpiarTodo()">
Limpiar
</button>

<button class="btn-accion btn-azul" onclick="agregarJugada()">
Agregar
</button>

<button class="btn-accion btn-gris" onclick="seleccionAleatoria()">
Aleatorio
</button>

</div>

<div class="desempate-contenedor">

<div style="font-weight:bold; margin-bottom:4px;">
🔥 MARCADOR DESEMPATE: MÉXICO VS GHANA 🔥
</div>

<div class="inputs-goles">
<input type="number" placeholder="0">
<span>-</span>
<input type="number" placeholder="0">
</div>

</div>

<div id="mensajeJugadas"></div>

<button class="btn-whatsapp-enviar" onclick="enviarWhatsApp()">
ENVIAR JUGADA
</button>

</div>

</div>

<script>

const partidosData = [

{ tipo:"fecha", texto:"Viernes 22 de Mayo" },

{
id:1,
local:"México",
visita:"Ghana"
},

{
id:2,
local:"Lens",
visita:"Nice"
},

{
id:3,
local:"Peñarol",
visita:"Corinthians"
},

{ tipo:"fecha", texto:"Sábado 23 de Mayo" },

{
id:4,
local:"Valencia",
visita:"Barcelona"
},

{
id:5,
local:"Real Madrid",
visita:"Athletic Bilbao"
},

{
id:6,
local:"Inter Miami",
visita:"Portland"
},

{ tipo:"fecha", texto:"Domingo 24 de Mayo" },

{
id:7,
local:"Manchester City",
visita:"Aston Villa"
},

{
id:8,
local:"Villarreal",
visita:"Atlético Madrid"
},

{
id:9,
local:"Gran Final",
visita:"Liga MX"
}

];

const respuestas = {};
let aleatorioYaUsado = false;

function inicializarTabla(){

const tabla = document.getElementById('cuerpoTabla');

partidosData.forEach(p=>{

if(p.tipo){

const filaFecha = document.createElement('tr');

filaFecha.innerHTML = `
<td colspan="5" class="fecha-cabecera">
${p.texto}
</td>
`;

tabla.appendChild(filaFecha);

}else{

const fila = document.createElement('tr');

fila.className = 'fila-partido';

fila.innerHTML = `

<td class="col-letra-l"
onclick="marcarCelda(${p.id}, 'L')"
id="cell-L-${p.id}">
L
</td>

<td class="col-equipo-local">
<div class="equipo-con-icono">
<span>⚽</span>
<span>${p.local}</span>
</div>
</td>

<td class="col-empate"
onclick="marcarCelda(${p.id}, 'E')"
id="cell-E-${p.id}">
E
</td>

<td class="col-equipo-visita">
<div class="equipo-con-icono equipo-visita-icono">
<span>${p.visita}</span>
<span>⚽</span>
</div>
</td>

<td class="col-letra-v"
onclick="marcarCelda(${p.id}, 'V')"
id="cell-V-${p.id}">
V
</td>
`;

tabla.appendChild(fila);

}

});

}

function marcarCelda(id, opcion){

const cellL = document.getElementById(`cell-L-${id}`);
const cellE = document.getElementById(`cell-E-${id}`);
const cellV = document.getElementById(`cell-V-${id}`);

if(respuestas[id] === opcion){

cellL.classList.remove('selected-cell');
cellE.classList.remove('selected-cell');
cellV.classList.remove('selected-cell');

delete respuestas[id];

return;

}

cellL.classList.remove('selected-cell');
cellE.classList.remove('selected-cell');
cellV.classList.remove('selected-cell');

if(opcion === 'L') cellL.classList.add('selected-cell');
if(opcion === 'E') cellE.classList.add('selected-cell');
if(opcion === 'V') cellV.classList.add('selected-cell');

respuestas[id] = opcion;

}

function limpiarTodo(){

Object.keys(respuestas).forEach(id=>{

document.getElementById(`cell-L-${id}`)?.classList.remove('selected-cell');
document.getElementById(`cell-E-${id}`)?.classList.remove('selected-cell');
document.getElementById(`cell-V-${id}`)?.classList.remove('selected-cell');

});

for(let key in respuestas){
delete respuestas[key];
}

aleatorioYaUsado = false;

document.getElementById('nombreParticipante').value = '';

document.querySelectorAll('.inputs-goles input').forEach(input=>{
input.value = '';
});

document.getElementById('mensajeJugadas').innerHTML = '';

}

function agregarJugada(){

const nombre = document.getElementById('nombreParticipante').value.trim();

if(nombre === ''){
alert('⚠️ QUINIELA SIN NOMBRE');
return;
}

let faltanPartidos = false;

partidosData.forEach(p=>{

if(!p.tipo && !respuestas[p.id]){
faltanPartidos = true;
}

});

if(faltanPartidos){
alert('⚠️ QUINIELA INCOMPLETA');
return;
}

const goles = document.querySelectorAll('.inputs-goles input');

const gol1 = goles[0].value;
const gol2 = goles[1].value;

if(gol1 === '' || gol2 === ''){
alert('⚠️ MARCADOR EXACTO INCOMPLETO');
return;
}

let jugada = '';

partidosData.forEach(p=>{

if(!p.tipo){
jugada += respuestas[p.id] + ' ';
}

});

document.getElementById('mensajeJugadas').innerHTML = `
TU JUGADA:
<br>
${jugada}
`;

}

function seleccionAleatoria(){

const opciones = ['L','E','V'];

partidosData.forEach(p=>{

if(!p.tipo){

if(!aleatorioYaUsado){

if(!respuestas[p.id]){

const random = opciones[Math.floor(Math.random()*3)];

marcarCelda(p.id, random);

}

}else{

document.getElementById(`cell-L-${p.id}`).classList.remove('selected-cell');
document.getElementById(`cell-E-${p.id}`).classList.remove('selected-cell');
document.getElementById(`cell-V-${p.id}`).classList.remove('selected-cell');

delete respuestas[p.id];

const random = opciones[Math.floor(Math.random()*3)];

marcarCelda(p.id, random);

}

}

});

const goles = document.querySelectorAll('.inputs-goles input');

goles[0].value = Math.floor(Math.random()*6);
goles[1].value = Math.floor(Math.random()*6);

aleatorioYaUsado = true;

}

function enviarWhatsApp(){

const nombre = document.getElementById('nombreParticipante').value.trim();

if(nombre === ''){
alert('⚠️ QUINIELA SIN NOMBRE');
return;
}

let faltanPartidos = false;

partidosData.forEach(p=>{

if(!p.tipo && !respuestas[p.id]){
faltanPartidos = true;
}

});

if(faltanPartidos){
alert('⚠️ QUINIELA INCOMPLETA');
return;
}

const goles = document.querySelectorAll('.inputs-goles input');

const gol1 = goles[0].value;
const gol2 = goles[1].value;

if(gol1 === '' || gol2 === ''){
alert('⚠️ MARCADOR EXACTO INCOMPLETO');
return;
}

let jugada = '';

partidosData.forEach(p=>{

if(!p.tipo){
jugada += respuestas[p.id] + ' ';
}

});

const mensaje = `
🏆 QUINIELAS EL 90 🏆

👤 Nombre:
${nombre}

📋 Jugada:
${jugada}

🔥 Desempate:
México ${gol1} - ${gol2} Ghana
`;

const numero = '524439000088';

const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

window.open(url, '_blank');

}

window.onload = inicializarTabla;

</script>

</body>
</html>
