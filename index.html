<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas El 90 - Quiniela de Inauguración</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: 'Roboto', sans-serif;
            padding: 4px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 630px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }
        
        header {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 5px 10px;
            position: relative;
            border-bottom: 2px solid #d4af37;
        }
        .header-title {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            line-height: 1.1;
        }
        .header-subtitle {
            font-size: 0.78rem;
            margin-top: 1px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .header-logo-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid #d4af37;
            background-color: #0b2240;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tabla-contenedor {
            width: 100%;
            background-color: #ffffff;
            background-image: url('LOGO.PNG.jpeg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 28%;
            position: relative;
        }
        .tabla-contenedor::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.93);
            z-index: 1;
        }

        .tabla-quiniela {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            position: relative;
            z-index: 2;
        }
        
        .fecha-cabecera {
            background-color: #f8fafc;
            color: #1e293b;
            font-weight: bold;
            text-align: center;
            padding: 4px;
            font-size: 0.68rem;
            text-transform: uppercase;
            border-bottom: 1px solid #cbd5e1;
            border-top: 1px solid #cbd5e1;
            letter-spacing: 0.5px;
        }

        .fila-partido {
            border-bottom: 1px solid #cbd5e1;
            height: 28px;
        }

        /* AJUSTE: Duplicado el padding lateral de L, E, V para hacerlas el doble de anchas que antes */
        .col-letra-l { width: 1%; text-align: center; cursor: pointer; user-select: none; border-right: 1px solid #e2e8f0; padding: 0 16px; white-space: nowrap; }
        .col-empate { width: 1%; text-align: center; cursor: pointer; user-select: none; border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 0 20px; white-space: nowrap; }
        .col-letra-v { width: 1%; text-align: center; cursor: pointer; user-select: none; border-left: 1px solid #e2e8f0; padding: 0 16px; white-space: nowrap; }
        
        /* Los equipos siguen expandiéndose de manera óptima */
        .col-equipo-local { padding-left: 8px; text-align: left; user-select: none; }
        .col-equipo-visita { padding-right: 8px; text-align: right; user-select: none; }

        .letra-fija, .btn-empate-cuadro {
            font-weight: bold;
            font-size: 0.85rem;
            color: #334155;
        }
        
        .bloque-equipo-interno {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 100%;
        }
        .bloque-equipo-interno.local { justify-content: flex-start; }
        .bloque-equipo-interno.visita { justify-content: flex-end; }

        .equipo-texto {
            font-weight: bold;
            color: #1e293b;
            font-size: 0.78rem;
            text-transform: uppercase;
            white-space: nowrap; 
            overflow: visible;
        }
        
        .balon-icono-nativo {
            width: 11px;
            height: 11px;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .selected-cell {
            background-color: #0b2240 !important;
        }
        .selected-cell .letra-fija,
        .selected-cell .btn-empate-cuadro {
            color: #d4af37 !important;
        }

        .banner-negro {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .banner-negro span { color: #ffcc00; }

        .banner-informes {
            background-color: #ffffff;
            color: #1e293b;
            text-align: center;
            padding: 3px;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .banner-facebook {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 4px;
            font-weight: bold;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .fb-icono {
            background-color: #ffffff;
            color: #0b2240;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.68rem;
        }

        .banner-total {
            text-align: center;
            padding: 3px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #1e293b;
        }

        .seccion-inputs {
            padding: 0 10px 6px 10px;
        }
        .input-nombre {
            width: 100%;
            padding: 6px;
            font-size: 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
            text-align: center;
        }

        .bloque-botones-triples {
            display: flex;
            gap: 5px;
            margin-bottom: 4px;
        }
        .btn-accion {
            flex: 1;
            padding: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            cursor: pointer;
