<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas El 90 - Quiniela de Inauguración</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: 'Roboto', sans-serif;
            padding: 4px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 630px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }
        
        header {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 5px 10px;
            position: relative;
            border-bottom: 2px solid #d4af37;
        }
        .header-title {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            line-height: 1.1;
        }
        .header-subtitle {
            font-size: 0.78rem;
            margin-top: 1px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .header-logo-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid #d4af37;
            background-color: #0b2240;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tabla-contenedor {
            width: 100%;
            background-color: #ffffff;
            background-image: url('LOGO.PNG.jpeg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 28%;
            position: relative;
        }
        .tabla-contenedor::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.93);
            z-index: 1;
        }

        .tabla-quiniela {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Mantenemos fixed para controlar los anchos exactos */
            position: relative;
            z-index: 2;
        }
        
        .fecha-cabecera {
            background-color: #f8fafc;
            color: #1e293b;
            font-weight: bold;
            text-align: center;
            padding: 2px;
            font-size: 0.68rem;
            text-transform: uppercase;
            border-bottom: 1px solid #cbd5e1;
            border-top: 1px solid #cbd5e1;
            letter-spacing: 0.5px;
        }

        .fila-partido {
            border-bottom: 1px solid #cbd5e1;
            height: 25.5px; /* Altura fija para mantener consistencia */
        }

        /* AJUSTE DE ANCHOS: Mínimo para L, E, V. Máximo para equipos. */
        .col-letra-l { width: 5%; text-align: center; cursor: pointer; user-select: none; border-right: 1px solid #e2e8f0; }
        .col-equipo-local { width: 38%; padding-left: 5px; text-align: left; user-select: none; }
        .col-empate { width: 8%; text-align: center; cursor: pointer; user-select: none; border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
        .col-equipo-visita { width: 38%; padding-right: 5px; text-align: right; user-select: none; }
        .col-letra-v { width: 5%; text-align: center; cursor: pointer; user-select: none; border-left: 1px solid #e2e8f0; }

        .letra-fija, .btn-empate-cuadro {
            font-weight: bold;
            font-size: 0.8rem;
            color: #334155;
        }
        
        .bloque-equipo-interno {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 100%;
        }
        .bloque-equipo-interno.local { justify-content: flex-start; }
        .bloque-equipo-interno.visita { justify-content: flex-end; }

        .equipo-texto {
            font-weight: bold;
            color: #1e293b;
            font-size: 0.75rem;
            text-transform: uppercase;
            /* Modificado para asegurar UNA SOLA FILA y que no se corte */
            white-space: nowrap; 
            overflow: visible;
            text-overflow: clip;
        }
        
        .balon-icono-nativo {
            width: 10px;
            height: 10px;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .selected-cell {
            background-color: #0b2240 !important;
        }
        .selected-cell .letra-fija,
        .selected-cell .btn-empate-cuadro {
            color: #d4af37 !important;
        }

        .banner-negro {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .banner-negro span { color: #ffcc00; }

        .banner-informes {
            background-color: #ffffff;
            color: #1e293b;
            text-align: center;
            padding: 3px;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .banner-facebook {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 4px;
            font-weight: bold;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .fb-icono {
            background-color: #ffffff;
            color: #0b2240;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.68rem;
        }

        .banner-total {
            text-align: center;
            padding: 3px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #1e293b;
        }

        .seccion-inputs {
            padding: 0 10px 6px 10px;
        }
        .input-nombre {
            width: 100%;
            padding: 6px;
            font-size: 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
            text-align: center;
        }

        .bloque-botones-triples {
            display: flex;
            gap: 5px;
            margin-bottom: 4px;
        }
        .btn-accion {
            flex: 1;
            padding: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-rojo { background-color: #ff0044; }
        .btn-azul { background-color: #257ae6; }
        .btn-gris { background-color: #434950; }

        .desempate-contenedor {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 4px;
            margin-bottom: 5px;
            text-align: center;
        }
        .desempate-txt {
            font-size: 0.68rem;
            font-weight: bold;
            color: #475569;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .inputs-goles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        .inputs-goles input {
            width: 38px;
            padding: 2px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }

        .btn-whatsapp-enviar {
            width: 100%;
            background-color: #25d366;
            color: #ffffff;
            border: none;
            padding: 9px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div class="header-title">QUINIELAS EL 90</div>
            <div class="header-subtitle">QUINIELA DE INAUGURACIÓN</div>
            <div class="header-logo-container">
                <img src="LOGO.PNG.jpeg" class="header-logo-img" alt="Logo El 90">
            </div>
        </header>

        <div class="tabla-contenedor">
            <table class="tabla-quiniela">
                <tbody id="cuerpoTabla">
                </tbody>
            </table>
        </div>

        <div class="banner-negro">
            <div>PRECIO: <span>GRATIS</span></div>
            <div>CIERRE: <span>JUEVES 11:00 P. M.</span></div>
        </div>

        <div class="banner-informes">
            INFORMES: +52 4439000088
        </div>

        <div class="banner-facebook">
            <span class="fb-icono">f</span> QUINIELAS EL 90
        </div>

        <div class="banner-total">
            TOTAL: $0.00
        </div>

        <div class="seccion-inputs">
            <input type="text" id="nombreParticipante" class="input-nombre" placeholder="NOMBRE DEL PARTICIPANTE">

            <div class="bloque-botones-triples">
                <button type="button" class="btn-accion btn-rojo" onclick="limpiarSelecciones()">Limpiar</button>
                <button type="button" class="btn-accion btn-azul" onclick="verificarRestantes()">Agregar</button>
                <button type="button" class="btn-accion btn-gris" onclick="generarCartillaAzar()">Aleatorio</button>
            </div>

            <div class="desempate-contenedor">
                <div class="desempate-txt">🔥 MARCADOR DESEMPATE: MÉXICO VS GHANA 🔥</div>
                <div class="inputs-goles">
                    <input type="number" id="golesL" min="0" placeholder="0">
                    <span style="font-weight: bold; color: #94a3b8; font-size: 0.95rem;">-</span>
                    <input type="number" id="golesV" min="0" placeholder="0">
                </div>
            </div>

            <button type="button" class="btn-whatsapp-enviar" onclick="procesarYEnviar()">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.69-4.98c-.202-.101-1.194-.588-1.378-.653-.184-.067-.317-.101-.45.101-.132.202-.51.653-.624.781-.114.128-.23.143-.432.042-.203-.102-.855-.315-1.63-1.002-.604-.539-1.012-1.207-1.13-1.41-.118-.203-.012-.313.089-.415.092-.092.202-.23.302-.346.1-.115.133-.197.2-.328.065-.13.032-.244-.015-.346-.047-.102-.45-1.085-.615-1.482-.162-.389-.34-.337-.466-.343-.119-.006-.255-.006-.39-.006s-.355.05-.54.254c-.186.203-.707.691-.707 1.683 0 .991.72 1.95.819 2.083.1.132 1.411 2.154 3.418 3.017.477.206.85.33 1.142.423.479.153.916.13 1.264.079.388-.058 1.194-.488 1.362-.958.168-.471.168-.874.118-.958-.05-.084-.184-.132-.386-.233z"/>
                </svg>
                Enviar Jugada
            </button>
        </div>

    </div>

    <script>
        // Función mágica para limpiar los códigos raros que mete Facebook (?fbclid=...) de la barra de direcciones
        function limpiarEnlaceFacebook() {
            if (window.location.search.indexOf('fbclid=') !== -1) {
                try {
                    const urlLimpia = window.location.protocol + "//" + window.location.host + window.location.pathname;
                    window.history.replaceState({}, document.title, urlLimpia);
                } catch (e) {
                    console.log("No se pudo limpiar el historial", e);
                }
            }
        }

        const partidosData = [
            { tipo: "fecha", texto: "Viernes 22 de Mayo" },
            { id: 1, local: "México", visita: "Ghana" },
            { id: 2, local: "Lens", visita: "Nice" },
            { id: 3, local: "Peñarol", visita: "Corinthians" },
            
            { tipo: "fecha", texto: "Sábado 23 de Mayo" },
            { id: 4, local: "Valencia", visita: "Barcelona" },
            { id: 5, local: "Real Madrid", visita: "Athletic Bilbao" },
            { id: 6, local: "Inter Miami", visita: "Portland" },

            { tipo: "fecha", texto: "Domingo 24 de Mayo" },
            { id: 7, local: "Manchester City", visita: "Aston Villa" },
            { id: 8, local: "Villarreal", visita: "Atlético Madrid" },
            { id: 9, local: "Pumas", visita: "Cruz Azul" }
        ];

        const respuestas = {};
        
        const balonSvgHtml = `
            <svg class="balon-icono-nativo" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                <path d="M11.5 5.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0z"/>
            </svg>
        `;

        function inicializarTabla() {
            limpiarEnlaceFacebook();
            try {
                const tabla = document.getElementById('cuerpoTabla');
                if(!tabla) return;
                tabla.innerHTML = "";

                partidosData.forEach(p => {
                    if(p.tipo === "fecha") {
                        const filaFecha = document.createElement('tr');
                        filaFecha.innerHTML = `<td colspan="5" class="fecha-cabecera">${p.texto}</td>`;
                        tabla.appendChild(filaFecha);
                    } else {
                        const fila = document.createElement('tr');
                        fila.className = "fila-partido";
                        
                        fila.innerHTML = `
                            <td class="col-letra-l" id="cell-L-${p.id}" onclick="marcarCelda(${p.id}, 'L')">
                                <span class="letra-fija">L</span>
                            </td>
                            <td class="col-equipo-local" id="cell-local-${p.id}">
                                <div class="bloque-equipo-interno local">
                                    ${balonSvgHtml}
                                    <span class="equipo-texto">${p.local}</span>
                                </div>
                            </td>
                            <td class="col-empate" id="cell-E-${p.id}" onclick="marcarCelda(${p.id}, 'E')">
                                <div class="btn-empate-cuadro">E</div>
                            </td>
                            <td class="col-equipo-visita" id="cell-visita-${p.id}">
                                <div class="bloque-equipo-interno visita">
                                    <span class="equipo-texto">${p.visita}</span>
                                    ${balonSvgHtml}
                                </div>
                            </td>
                            <td class="col-letra-v" id="cell-V-${p.id}" onclick="marcarCelda(${p.id}, 'V')">
                                <span class="letra-fija">V</span>
                            </td>
                        `;
                        tabla.appendChild(fila);
                    }
                });
            } catch (e) {
                console.error("Error al renderizar casillero: ", e);
            }
        }

        function marcarCelda(id, opcion) {
            const cellL = document.getElementById(`cell-L-${id}`);
            const cellE = document.getElementById(`cell-E-${id}`);
            const cellV = document.getElementById(`cell-V-${id}`);

            if(!cellL || !cellE || !cellV) return;

            if (respuestas[id] === opcion) {
                if (opcion === 'L') cellL.classList.remove('selected-cell');
                if (opcion === 'E') cellE.classList.remove('selected-cell');
                if (opcion === 'V') cellV.classList.remove('selected-cell');
                delete respuestas[id];
                return;
            }

            cellL.classList.remove('selected-cell');
            cellE.classList.remove('selected-cell');
            cellV.classList.remove('selected-cell');
            
            if (opcion === 'L') {
                cellL.classList.add('selected-cell');
            } else if (opcion === 'E') {
                cellE.classList.add('selected-cell');
            } else if (opcion === 'V') {
                cellV.classList.add('selected-cell');
            }
            
            respuestas[id] = opcion;
        }

        function limpiarSelecciones() {
            partidosData.forEach(p => {
                if(!p.tipo) {
                    const cellL = document.getElementById(`cell-L-${p.id}`);
                    const cellE = document.getElementById(`cell-E-${p.id}`);
                    const cellV = document.getElementById(`cell-V-${p.id}`);

                    if(cellL) cellL.classList.remove('selected-cell');
                    if(cellE) cellE.classList.remove('selected-cell');
                    if(cellV) cellV.classList.remove('selected-cell');
                    
                    delete respuestas[p.id];
                }
            });
            document.getElementById('golesL').value = "";
            document.getElementById('golesV').value = "";
        }

        function generarCartillaAzar() {
            const opciones = ['L', 'E', 'V'];
            partidosData.forEach(p => {
                if(!p.tipo) {
                    const seleccion = opciones[Math.floor(Math.random() * opciones.length)];
                    marcarCelda(p.id, seleccion);
                }
            });
            document.getElementById('golesL').value = Math.floor(Math.random() * 4);
            document.getElementById('golesV').value = Math.floor(Math.random() * 4);
        }

        function verificarRestantes() {
            const partidosReales = partidosData.filter(p => !p.tipo).length;
            const marcados = Object.keys(respuestas).length;
            alert(`Llevas ${marcados} de ${partidosReales} pronósticos seleccionados.`);
        }

        function procesarYEnviar() {
            const nombre = document.getElementById('nombreParticipante').value.trim();
            const gl = document.getElementById('golesL').value;
            const gv = document.getElementById('golesV').value;
            const partidosReales = partidosData.filter(p => !p.tipo);

            if(!nombre) { alert("Ingresa el NOMBRE DEL PARTICIPANTE por favor."); return; }
            if(Object.keys(respuestas).length < partidosReales.length) { alert("Completa todos los pronósticos de la cartilla."); return; }
            if(gl === "" || gv === "") { alert("Ingresa el marcador de desempate."); return; }

            let textoMensaje = `⚽ *JUGADA: QUINIELAS EL 90* ⚽\n\n👤 *Participante:* ${nombre.toUpperCase()}\n\n📝 *PRONÓSTICOS:*\n`;
            
            partidosReales.forEach(p => {
                textoMensaje += `${p.id}. ${p.local} vs ${p.visita} ➡️ *[ ${respuestas[p.id]} ]*\n`;
            });
            
            textoMensaje += `\n🔥 *Desempate México vs Ghana:* ${gl} - ${gv}`;

            window.open(`https://wa.me/524439000088?text=${encodeURIComponent(textoMensaje)}`, '_blank');
        }

        window.onload = inicializarTabla;
    </script>
</body>
</html>
