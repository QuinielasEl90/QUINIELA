<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas El 90 - Quiniela de Inauguración</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            color: #333333;
            font-family: 'Roboto', sans-serif;
            padding: 4px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 630px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }

        header {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 5px 10px;
            position: relative;
            border-bottom: 2px solid #d4af37;
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            line-height: 1.1;
        }

        .header-subtitle {
            font-size: 0.78rem;
            margin-top: 1px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .header-logo-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid #d4af37;
            background-color: #0b2240;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tabla-contenedor {
            width: 100%;
            background-color: #ffffff;
            background-image: url('LOGO.PNG.jpeg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 28%;
            position: relative;
        }

        .tabla-contenedor::before {
            content: "";
            position: absolute;
            inset: 0;
            background-color: rgba(255,255,255,0.93);
            z-index: 1;
        }

        .tabla-quiniela {
            width: 100%;
            border-collapse: collapse;
            position: relative;
            z-index: 2;
        }

        .fecha-cabecera {
            background-color: #f8fafc;
            color: #1e293b;
            font-weight: bold;
            text-align: center;
            padding: 4px;
            font-size: 0.68rem;
            text-transform: uppercase;
            border-bottom: 1px solid #cbd5e1;
            border-top: 1px solid #cbd5e1;
            letter-spacing: 0.5px;
        }

        .fila-partido {
            border-bottom: 1px solid #cbd5e1;
            height: 48px;
        }

        .col-letra-l,
        .col-empate,
        .col-letra-v {
            width: 60px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
        }

        .col-letra-l:hover,
        .col-empate:hover,
        .col-letra-v:hover {
            background-color: #e2e8f0;
        }

        .col-letra-l {
            border-right: 1px solid #e2e8f0;
        }

        .col-empate {
            border-left: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
        }

        .col-letra-v {
            border-left: 1px solid #e2e8f0;
        }

        .col-equipo-local {
            padding-left: 8px;
            font-weight: bold;
        }

        .col-equipo-visita {
            padding-right: 8px;
            font-weight: bold;
            text-align: right;
        }

        .equipo-con-logo {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .equipo-visita-logo {
            justify-content: flex-end;
        }

        .logo-equipo {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .selected-cell {
            background-color: #0b2240 !important;
            color: #d4af37 !important;
        }

        .banner-negro {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .banner-negro span {
            color: #ffcc00;
        }

        .banner-informes {
            background-color: #ffffff;
            color: #1e293b;
            text-align: center;
            padding: 3px;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .banner-facebook {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 4px;
            font-weight: bold;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .fb-icono {
            background-color: #ffffff;
            color: #0b2240;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.68rem;
        }

        .banner-total {
            text-align: center;
            padding: 3px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #1e293b;
        }

        .seccion-inputs {
            padding: 0 10px 10px 10px;
        }

        .input-nombre {
            width: 100%;
            padding: 6px;
            font-size: 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
            text-align: center;
        }

        .bloque-botones-triples {
            display: flex;
            gap: 5px;
            margin-bottom: 4px;
        }

        .btn-accion {
            flex: 1;
            padding: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-rojo {
            background-color: #ff0044;
        }

        .btn-azul {
            background-color: #257ae6;
        }

        .btn-gris {
            background-color: #434950;
        }

        .desempate-contenedor {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 4px;
            margin-bottom: 5px;
            text-align: center;
        }

        .inputs-goles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .inputs-goles input {
            width: 38px;
            padding: 2px;
            text-align: center;
            font-weight: bold;
        }

        #mensajeJugadas {
            margin-top: 6px;
            margin-bottom: 6px;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            min-height: 35px;
        }

        .btn-whatsapp-enviar {
            width: 100%;
            background-color: #25d366;
            color: #ffffff;
            border: none;
            padding: 9px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

<div class="container">

<header>

    <div class="header-title">
        QUINIELAS EL 90
    </div>

    <div class="header-subtitle">
        QUINIELA DE INAUGURACIÓN
    </div>

    <div class="header-logo-container">
        <img src="LOGO.PNG.jpeg" class="header-logo-img">
    </div>

</header>

<div class="tabla-contenedor">

    <table class="tabla-quiniela">
        <tbody id="cuerpoTabla"></tbody>
    </table>

</div>

<div class="banner-negro">
    <div>PRECIO: <span>GRATIS</span></div>
    <div>CIERRE: <span>JUEVES 11:00 P. M.</span></div>
</div>

<div class="banner-informes">
    INFORMES: +52 4439000088
</div>

<div class="banner-facebook">
    <span class="fb-icono">f</span>
    QUINIELAS EL 90
</div>

<div class="banner-total">
    TOTAL: $0.00
</div>

<div class="seccion-inputs">

    <input 
        type="text" 
        id="nombreParticipante" 
        class="input-nombre" 
        placeholder="NOMBRE DEL PARTICIPANTE"
    >

    <div class="bloque-botones-triples">

        <button class="btn-accion btn-rojo" onclick="limpiarTodo()">
            Limpiar
        </button>

        <button class="btn-accion btn-azul" onclick="agregarJugada()">
            Agregar
        </button>

        <button class="btn-accion btn-gris" onclick="seleccionAleatoria()">
            Aleatorio
        </button>

    </div>

    <div class="desempate-contenedor">

        <div style="font-weight:bold; margin-bottom:4px;">
            🔥 MARCADOR DESEMPATE: MÉXICO VS GHANA 🔥
        </div>

        <div class="inputs-goles">
            <input type="number" placeholder="0">
            <span>-</span>
            <input type="number" placeholder="0">
        </div>

    </div>

    <div id="mensajeJugadas"></div>

    <button class="btn-whatsapp-enviar" onclick="enviarWhatsApp()">
        ENVIAR JUGADA
    </button>

</div>

</div>

<script>

const partidosData = [

    { tipo: "fecha", texto: "Viernes 22 de Mayo" },

    {
        id: 1,
        local: "México",
        logoLocal: "logos/mexico.png",
        visita: "Ghana",
        logoVisita: "logos/ghana.png"
    },

    {
        id: 2,
        local: "Lens",
        logoLocal: "logos/lens.png",
        visita: "Nice",
        logoVisita: "logos/nice.png"
    },

    {
        id: 3,
        local: "Peñarol",
        logoLocal: "logos/penarol.png",
        visita: "Corinthians",
        logoVisita: "logos/corinthians.png"
    },

    { tipo: "fecha", texto: "Sábado 23 de Mayo" },

    {
        id: 4,
        local: "Valencia",
        logoLocal: "logos/valencia.png",
        visita: "Barcelona",
        logoVisita: "logos/barcelona.png"
    },

    {
        id: 5,
        local: "Real Madrid",
        logoLocal: "logos/realmadrid.png",
        visita: "Athletic Bilbao",
        logoVisita: "logos/bilbao.png"
    },

    {
        id: 6,
        local: "Inter Miami",
        logoLocal: "logos/intermiami.png",
        visita: "Portland",
        logoVisita: "logos/portland.png"
    },

    { tipo: "fecha", texto: "Domingo 24 de Mayo" },

    {
        id: 7,
        local: "Manchester City",
        logoLocal: "logos/mancity.png",
        visita: "Aston Villa",
        logoVisita: "logos/astonvilla.png"
    },

    {
        id: 8,
        local: "Villarreal",
        logoLocal: "logos/villarreal.png",
        visita: "Atlético Madrid",
        logoVisita: "logos/atletico.png"
    },

    {
        id: 9,
        local: "Gran Final",
        logoLocal: "logos/ligamx.png",
        visita: "Liga MX",
        logoVisita: "logos/ligamx.png"
    }

];

const respuestas = {};

function inicializarTabla() {

    const tabla = document.getElementById('cuerpoTabla');

    partidosData.forEach(p => {

        if (p.tipo === 'fecha') {

            const filaFecha = document.createElement('tr');

            filaFecha.innerHTML = `
                <td colspan="5" class="fecha-cabecera">
                    ${p.texto}
                </td>
            `;

            tabla.appendChild(filaFecha);

        } else {

            const fila = document.createElement('tr');
            fila.className = 'fila-partido';

            fila.innerHTML = `

                <td class="col-letra-l" onclick="marcarCelda(${p.id}, 'L')" id="cell-L-${p.id}">
                    L
                </td>

                <td class="col-equipo-local">
                    <div class="equipo-con-logo">
                        <img src="${p.logoLocal}" class="logo-equipo">
                        <span>${p.local}</span>
                    </div>
                </td>

                <td class="col-empate" onclick="marcarCelda(${p.id}, 'E')" id="cell-E-${p.id}">
                    E
                </td>

                <td class="col-equipo-visita">
                    <div class="equipo-con-logo equipo-visita-logo">
                        <span>${p.visita}</span>
                        <img src="${p.logoVisita}" class="logo-equipo">
                    </div>
                </td>

                <td class="col-letra-v" onclick="marcarCelda(${p.id}, 'V')" id="cell-V-${p.id}">
                    V
                </td>

            `;

            tabla.appendChild(fila);

        }

    });

}

function marcarCelda(id, opcion) {

    const cellL = document.getElementById(`cell-L-${id}`);
    const cellE = document.getElementById(`cell-E-${id}`);
    const cellV = document.getElementById(`cell-V-${id}`);

    if (respuestas[id] === opcion) {

        cellL.classList.remove('selected-cell');
        cellE.classList.remove('selected-cell');
        cellV.classList.remove('selected-cell');

        delete respuestas[id];

        return;

    }

    cellL.classList.remove('selected-cell');
    cellE.classList.remove('selected-cell');
    cellV.classList.remove('selected-cell');

    if (opcion === 'L') cellL.classList.add('selected-cell');
    if (opcion === 'E') cellE.classList.add('selected-cell');
    if (opcion === 'V') cellV.classList.add('selected-cell');

    respuestas[id] = opcion;

}

function limpiarTodo() {

    Object.keys(respuestas).forEach(id => {

        document.getElementById(`cell-L-${id}`)?.classList.remove('selected-cell');
        document.getElementById(`cell-E-${id}`)?.classList.remove('selected-cell');
        document.getElementById(`cell-V-${id}`)?.classList.remove('selected-cell');

    });

    for (let key in respuestas) {
        delete respuestas[key];
    }

    document.getElementById('nombreParticipante').value = '';

    document.querySelectorAll('.inputs-goles input').forEach(input => {
        input.value = '';
    });

    document.getElementById('mensajeJugadas').innerHTML = '';

}

function agregarJugada() {

    let jugada = '';

    partidosData.forEach(p => {

        if (!p.tipo) {

            if (respuestas[p.id]) {
                jugada += respuestas[p.id] + ' ';
            } else {
                jugada += '- ';
            }

        }

    });

    document.getElementById('mensajeJugadas').innerHTML = `
        TU JUGADA:
        <br>
        ${jugada}
    `;

}

function seleccionAleatoria() {

    const opciones = ['L', 'E', 'V'];

    partidosData.forEach(p => {

        if (!p.tipo) {

            const random = opciones[Math.floor(Math.random() * 3)];

            marcarCelda(p.id, random);

        }

    });

}

function enviarWhatsApp() {

    const nombre = document.getElementById('nombreParticipante').value;

    let jugada = '';

    partidosData.forEach(p => {

        if (!p.tipo) {

            if (respuestas[p.id]) {
                jugada += respuestas[p.id] + ' ';
            } else {
                jugada += '- ';
            }

        }

    });

    const goles = document.querySelectorAll('.inputs-goles input');

    const gol1 = goles[0].value || '0';
    const gol2 = goles[1].value || '0';

    const mensaje = `
🏆 QUINIELAS EL 90 🏆

👤 Nombre:
${nombre}

📋 Jugada:
${jugada}

🔥 Desempate:
México ${gol1} - ${gol2} Ghana
`;

    const numero = '524439000088';

    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    window.open(url, '_blank');

}

window.onload = inicializarTabla;

</script>

</body>
</html>
