<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas El 90 - Quiniela de Inauguración</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #ffffff;
            color: #333333;
            font-family: 'Roboto', sans-serif;
            padding: 4px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 630px;
            border: 1px solid #cbd5e1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }

        header {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 5px 10px;
            position: relative;
            border-bottom: 2px solid #d4af37;
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            line-height: 1.1;
        }

        .header-subtitle {
            font-size: 0.78rem;
            margin-top: 1px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .header-logo-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid #d4af37;
            background-color: #0b2240;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tabla-contenedor {
            width: 100%;
            background-color: #ffffff;
            background-image: url('LOGO.PNG.jpeg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 28%;
            position: relative;
        }

        .tabla-contenedor::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,255,255,0.93);
            z-index: 1;
        }

        .tabla-quiniela {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            position: relative;
            z-index: 2;
        }

        .fecha-cabecera {
            background-color: #f8fafc;
            color: #1e293b;
            font-weight: bold;
            text-align: center;
            padding: 4px;
            font-size: 0.68rem;
            text-transform: uppercase;
            border-bottom: 1px solid #cbd5e1;
            border-top: 1px solid #cbd5e1;
            letter-spacing: 0.5px;
        }

        /* FILAS MÁS ALTAS */

        .fila-partido {
            border-bottom: 1px solid #cbd5e1;
            height: 42px;
        }

        /* CASILLAS MÁS GRANDES */

        .col-letra-l {
            width: 60px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            border-right: 1px solid #e2e8f0;
        }

        .col-empate {
            width: 60px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            border-left: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
        }

        .col-letra-v {
            width: 60px;
            min-width: 60px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            border-left: 1px solid #e2e8f0;
        }

        .col-equipo-local {
            padding-left: 8px;
            text-align: left;
            user-select: none;
        }

        .col-equipo-visita {
            padding-right: 8px;
            text-align: right;
            user-select: none;
        }

        .letra-fija,
        .btn-empate-cuadro {
            font-weight: bold;
            font-size: 1rem;
            color: #334155;
        }

        .bloque-equipo-interno {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 100%;
        }

        .bloque-equipo-interno.local {
            justify-content: flex-start;
        }

        .bloque-equipo-interno.visita {
            justify-content: flex-end;
        }

        .equipo-texto {
            font-weight: bold;
            color: #1e293b;
            font-size: 0.78rem;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: visible;
        }

        .balon-icono-nativo {
            width: 11px;
            height: 11px;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .selected-cell {
            background-color: #0b2240 !important;
        }

        .selected-cell .letra-fija,
        .selected-cell .btn-empate-cuadro {
            color: #d4af37 !important;
        }

        .banner-negro {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .banner-negro span {
            color: #ffcc00;
        }

        .banner-informes {
            background-color: #ffffff;
            color: #1e293b;
            text-align: center;
            padding: 3px;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .banner-facebook {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 4px;
            font-weight: bold;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .fb-icono {
            background-color: #ffffff;
            color: #0b2240;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.68rem;
        }

        .banner-total {
            text-align: center;
            padding: 3px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #1e293b;
        }

        .seccion-inputs {
            padding: 0 10px 6px 10px;
        }

        .input-nombre {
            width: 100%;
            padding: 6px;
            font-size: 0.85rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
            font-weight: bold;
            text-align: center;
        }

        .bloque-botones-triples {
            display: flex;
            gap: 5px;
            margin-bottom: 4px;
        }

        .btn-accion {
            flex: 1;
            padding: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-rojo { background-color: #ff0044; }
        .btn-azul { background-color: #257ae6; }
        .btn-gris { background-color: #434950; }

        .desempate-contenedor {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 4px;
            margin-bottom: 5px;
            text-align: center;
        }

        .desempate-txt {
            font-size: 0.68rem;
            font-weight: bold;
            color: #475569;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .inputs-goles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .inputs-goles input {
            width: 38px;
            padding: 2px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }

        .btn-whatsapp-enviar {
            width: 100%;
            background-color: #25d366;
            color: #ffffff;
            border: none;
            padding: 9px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

<div class="container">

<header>
    <div class="header-title">QUINIELAS EL 90</div>
    <div class="header-subtitle">QUINIELA DE INAUGURACIÓN</div>

    <div class="header-logo-container">
        <img src="LOGO.PNG.jpeg" class="header-logo-img" alt="Logo El 90">
    </div>
</header>

<div class="tabla-contenedor">
    <table class="tabla-quiniela">
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

</div>

<script>

const partidosData = [
    { tipo: "fecha", texto: "Viernes 22 de Mayo" },
    { id: 1, local: "México", visita: "Ghana" },
    { id: 2, local: "Lens", visita: "Nice" },
    { id: 3, local: "Peñarol", visita: "Corinthians" },

    { tipo: "fecha", texto: "Sábado 23 de Mayo" },
    { id: 4, local: "Valencia", visita: "Barcelona" },
    { id: 5, local: "Real Madrid", visita: "Athletic Bilbao" },
    { id: 6, local: "Inter Miami", visita: "Portland" },

    { tipo: "fecha", texto: "Domingo 24 de Mayo" },
    { id: 7, local: "Manchester City", visita: "Aston Villa" },
    { id: 8, local: "Villarreal", visita: "Atlético Madrid" },
    { id: 9, local: "Gran Final", visita: "Liga MX" }
];

const respuestas = {};

function inicializarTabla() {

    const tabla = document.getElementById('cuerpoTabla');

    partidosData.forEach(p => {

        if (p.tipo === "fecha") {

            const filaFecha = document.createElement('tr');

            filaFecha.innerHTML = `
                <td colspan="5" class="fecha-cabecera">
                    ${p.texto}
                </td>
            `;

            tabla.appendChild(filaFecha);

        } else {

            const fila = document.createElement('tr');

            fila.className = "fila-partido";

            fila.innerHTML = `
                <td class="col-letra-l" onclick="marcarCelda(${p.id}, 'L')" id="cell-L-${p.id}">
                    <span class="letra-fija">L</span>
                </td>

                <td class="col-equipo-local">
                    ${p.local}
                </td>

                <td class="col-empate" onclick="marcarCelda(${p.id}, 'E')" id="cell-E-${p.id}">
                    <span class="btn-empate-cuadro">E</span>
                </td>

                <td class="col-equipo-visita">
                    ${p.visita}
                </td>

                <td class="col-letra-v" onclick="marcarCelda(${p.id}, 'V')" id="cell-V-${p.id}">
                    <span class="letra-fija">V</span>
                </td>
            `;

            tabla.appendChild(fila);
        }
    });
}

function marcarCelda(id, opcion) {

    const cellL = document.getElementById(`cell-L-${id}`);
    const cellE = document.getElementById(`cell-E-${id}`);
    const cellV = document.getElementById(`cell-V-${id}`);

    cellL.classList.remove('selected-cell');
    cellE.classList.remove('selected-cell');
    cellV.classList.remove('selected-cell');

    if(opcion === 'L') cellL.classList.add('selected-cell');
    if(opcion === 'E') cellE.classList.add('selected-cell');
    if(opcion === 'V') cellV.classList.add('selected-cell');

    respuestas[id] = opcion;
}

window.onload = inicializarTabla;

</script>

</body>
</html>
