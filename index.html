<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quinielas El 90</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#f1f5f9;
    font-family:'Roboto',sans-serif;
    padding:5px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:650px;
    border:1px solid #cbd5e1;
    background:#ffffff;
    box-shadow:0 6px 12px rgba(0,0,0,0.15);
    overflow:hidden;
}

header{
    position:relative;
    background:linear-gradient(
        90deg,
        #001f54 0%,
        #0066ff 35%,
        #00c3ff 70%,
        #ffd700 100%
    );
    color:#ffffff;
    text-align:center;
    padding:22px 15px;
    border-bottom:4px solid #ffffff;
    box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

.header-title{
    font-family:'Trebuchet MS',sans-serif;
    font-size:1.9rem;
    font-weight:900;
    letter-spacing:2px;
    color:#ffffff;
    text-shadow:
        0 0 5px rgba(255,255,255,0.5),
        0 0 10px rgba(0,195,255,0.7),
        2px 2px 4px rgba(0,0,0,0.5);
}

.header-subtitle{
    color:#ffe66d;
    font-size:0.9rem;
    font-weight:bold;
    margin-top:4px;
    letter-spacing:1px;
    text-shadow:1px 1px 3px rgba(0,0,0,0.4);
}

.logo-superior{
    position:absolute;
    right:6px;
    top:50%;
    transform:translateY(-50%);
    width:82px;
    height:82px;
    object-fit:contain;
    border-radius:50%;
    background:#ffffff;
    padding:3px;
}

.tabla-contenedor{
    position:relative;
    overflow:hidden;
}

.tabla-contenedor::before{
    content:"";
    position:absolute;
    inset:0;
    background:url('LOGO.PNG.jpeg') center center no-repeat;
    background-size:320px;
    opacity:0.18;
    pointer-events:none;
}

.tabla-quiniela{
    width:100%;
    border-collapse:collapse;
    position:relative;
    z-index:2;
    background:transparent;
}

.fila-partido{
    height:32px;
    border-bottom:1px solid #cbd5e1;
    background:rgba(255,255,255,0.92);
}

.col-letra-l,
.col-empate,
.col-letra-v{
    width:48px;
    min-width:48px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
    font-size:0.8rem;
    transition:0.2s;
    border-left:1px solid #cbd5e1;
    border-right:1px solid #cbd5e1;
}

.col-letra-l:hover,
.col-empate:hover,
.col-letra-v:hover{
    background:#e2e8f0;
}

.col-equipo-local{
    padding-left:6px;
    font-size:0.78rem;
    font-weight:bold;
    border-right:1px solid #cbd5e1;
}

.col-equipo-visita{
    padding-right:6px;
    text-align:right;
    font-size:0.78rem;
    font-weight:bold;
    border-left:1px solid #cbd5e1;
}

.equipo-con-icono{
    display:flex;
    align-items:center;
    gap:5px;
}

.equipo-visita-icono{
    justify-content:flex-end;
}

.logo-equipo{
    width:18px;
    height:18px;
    object-fit:contain;
}

.selected-cell{
    background:#001f54 !important;
    color:#ffd700 !important;
}

.banner-negro{
    background:linear-gradient(
        90deg,
        #001f54 0%,
        #0066ff 35%,
        #00c3ff 70%,
        #ffd700 100%
    );
    color:#ffffff;
    display:flex;
    justify-content:space-between;
    padding:6px 12px;
    font-size:0.8rem;
    font-weight:bold;
}

.banner-negro span{
    color:#ffffff;
}

.banner-informes{
    text-align:center;
    padding:5px;
    font-size:1rem;
    font-weight:bold;
}

.banner-facebook{
    background:#1877f2;
    color:#ffffff;
    text-align:center;
    padding:7px;
    font-size:0.95rem;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.logo-facebook{
    width:22px;
    height:22px;
    object-fit:contain;
}

.banner-total{
    text-align:center;
    padding:5px;
    font-size:1rem;
    font-weight:bold;
}

.seccion-inputs{
    padding:10px;
}

.input-nombre{
    width:100%;
    padding:8px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    text-align:center;
    font-weight:bold;
    margin-bottom:6px;
}

.bloque-botones-triples{
    display:flex;
    gap:5px;
    margin-bottom:6px;
}

.btn-accion{
    flex:1;
    border:none;
    padding:8px;
    color:#ffffff;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
    transition:0.2s;
}

.btn-accion:hover{
    transform:scale(1.02);
}

.btn-rojo{
    background:#ff0044;
}

.btn-azul{
    background:#257ae6;
}

.btn-gris{
    background:#000000;
}

.desempate-contenedor{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:4px;
    padding:6px;
    text-align:center;
    margin-bottom:6px;
}

.inputs-goles{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:5px;
}

.inputs-goles input{
    width:40px;
    padding:3px;
    text-align:center;
    font-weight:bold;
}

#mensajeJugadas{
    margin-top:5px;
    margin-bottom:5px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    padding:6px;
    text-align:center;
    font-weight:bold;
    min-height:35px;
}

.btn-whatsapp-enviar{
    width:100%;
    background:#25d366;
    border:none;
    color:#ffffff;
    padding:11px;
    font-size:1rem;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<header>

<div class="header-title">
QUINIELAS EL 90
</div>

<div class="header-subtitle">
QUINIELA DE INAUGURACIÓN
</div>

<img src="LOGO.PNG.jpeg" class="logo-superior">

</header>

<div class="tabla-contenedor">

<table class="tabla-quiniela">
<tbody id="cuerpoTabla"></tbody>
</table>

</div>

<div class="banner-negro">
<div>PRECIO: <span>GRATIS</span></div>
<div>CIERRE: <span>JUEVES 11:00 P. M.</span></div>
</div>

<div class="banner-informes">
INFORMES: +52 4439000088
</div>

<div class="banner-facebook">
<img src="facebook.png" class="logo-facebook">
<span>QUINIELAS EL 90</span>
</div>

<div class="banner-total">
TOTAL: $0.00
</div>

<div class="seccion-inputs">

<input
type="text"
id="nombreParticipante"
class="input-nombre"
placeholder="NOMBRE DEL PARTICIPANTE"
>

<div class="bloque-botones-triples">

<button class="btn-accion btn-rojo" onclick="limpiarTodo()">
Limpiar
</button>

<button class="btn-accion btn-azul" onclick="agregarJugada()">
Agregar
</button>

<button class="btn-accion btn-gris" onclick="seleccionAleatoria()">
Aleatorio
</button>

</div>

<div class="desempate-contenedor">

<div style="font-weight:bold; margin-bottom:4px;">
🔥 MARCADOR DESEMPATE: MÉXICO VS GHANA 🔥
</div>

<div class="inputs-goles">
<input type="number" placeholder="0">
<span>-</span>
<input type="number" placeholder="0">
</div>

</div>

<div id="mensajeJugadas"></div>

<button class="btn-whatsapp-enviar" onclick="enviarWhatsApp()">
ENVIAR JUGADA
</button>

</div>

</div>

<script>

const partidosData = [

{
id:1,
local:"México",
logoLocal:"mexico.png",
visita:"Ghana",
logoVisita:"ghana.png"
},

{
id:2,
local:"Lens",
logoLocal:"lens.jpg",
visita:"Nice",
logoVisita:"nice.png"
},

{
id:3,
local:"Peñarol",
logoLocal:"peñarol.png",
visita:"Corinthians",
logoVisita:"corinthians.jpg"
},

{
id:4,
local:"Valencia",
logoLocal:"valencia.png",
visita:"Barcelona",
logoVisita:"barcelona.png"
},

{
id:5,
local:"Real Madrid",
logoLocal:"realmadrid.png",
visita:"Athletic Bilbao",
logoVisita:"athleticbilbao.png"
},

{
id:6,
local:"Inter Miami",
logoLocal:"intermiami.png",
visita:"Portland",
logoVisita:"portlandtimbers.png"
},

{
id:7,
local:"Manchester City",
logoLocal:"manchestercity.png",
visita:"Aston Villa",
logoVisita:"astonvilla.png"
},

{
id:8,
local:"Villarreal",
logoLocal:"villareal.png",
visita:"Atlético Madrid",
logoVisita:"atleticomadrid.png"
},

{
id:9,
local:"Pumas",
logoLocal:"pumas.png",
visita:"Cruz Azul",
logoVisita:"cruzazul.png"
}

];

const respuestas = {};

function inicializarTabla(){

const tabla = document.getElementById('cuerpoTabla');

partidosData.forEach(p=>{

const fila = document.createElement('tr');

fila.className = 'fila-partido';

fila.innerHTML = `

<td class="col-letra-l"
onclick="marcarCelda(${p.id}, 'L')"
id="cell-L-${p.id}">
L
</td>

<td class="col-equipo-local">
<div class="equipo-con-icono">
<img src="${p.logoLocal}" class="logo-equipo">
<span>${p.local}</span>
</div>
</td>

<td class="col-empate"
onclick="marcarCelda(${p.id}, 'E')"
id="cell-E-${p.id}">
E
</td>

<td class="col-equipo-visita">
<div class="equipo-con-icono equipo-visita-icono">
<span>${p.visita}</span>
<img src="${p.logoVisita}" class="logo-equipo">
</div>
</td>

<td class="col-letra-v"
onclick="marcarCelda(${p.id}, 'V')"
id="cell-V-${p.id}">
V
</td>
`;

tabla.appendChild(fila);

});

}

function marcarCelda(id, opcion){

const cellL = document.getElementById(`cell-L-${id}`);
const cellE = document.getElementById(`cell-E-${id}`);
const cellV = document.getElementById(`cell-V-${id}`);

cellL.classList.remove('selected-cell');
cellE.classList.remove('selected-cell');
cellV.classList.remove('selected-cell');

if(opcion === 'L') cellL.classList.add('selected-cell');
if(opcion === 'E') cellE.classList.add('selected-cell');
if(opcion === 'V') cellV.classList.add('selected-cell');

respuestas[id] = opcion;

}

function limpiarTodo(){

Object.keys(respuestas).forEach(id=>{

document.getElementById(`cell-L-${id}`)?.classList.remove('selected-cell');
document.getElementById(`cell-E-${id}`)?.classList.remove('selected-cell');
document.getElementById(`cell-V-${id}`)?.classList.remove('selected-cell');

});

for(let key in respuestas){
delete respuestas[key];
}

document.getElementById('nombreParticipante').value = '';

document.querySelectorAll('.inputs-goles input').forEach(input=>{
input.value = '';
});

document.getElementById('mensajeJugadas').innerHTML = '';

}

function agregarJugada(){

const nombre = document.getElementById('nombreParticipante').value.trim();

if(nombre === ''){
alert('⚠️ QUINIELA SIN NOMBRE');
return;
}

let jugada = '';

partidosData.forEach(p=>{
jugada += respuestas[p.id] + ' ';
});

document.getElementById('mensajeJugadas').innerHTML = `
TU JUGADA:
<br>
${jugada}
`;

}

function seleccionAleatoria(){

const opciones = ['L','E','V'];

partidosData.forEach(p=>{

const random = opciones[Math.floor(Math.random()*3)];

marcarCelda(p.id, random);

});

const goles = document.querySelectorAll('.inputs-goles input');

goles[0].value = Math.floor(Math.random()*6);
goles[1].value = Math.floor(Math.random()*6);

}

function enviarWhatsApp(){

const nombre = document.getElementById('nombreParticipante').value.trim();

if(nombre === ''){
alert('⚠️ QUINIELA SIN NOMBRE');
return;
}

const goles = document.querySelectorAll('.inputs-goles input');

let jugada = '';

partidosData.forEach(p=>{
jugada += respuestas[p.id] + ' ';
});

const mensaje = `
🏆 QUINIELAS EL 90 🏆

👤 Nombre:
${nombre}

📋 Jugada:
${jugada}

🔥 Desempate:
México ${goles[0].value} - ${goles[1].value} Ghana
`;

const numero = '524439000088';

const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

window.open(url, '_blank');

}

window.onload = inicializarTabla;

</script>

</body>
</html>
