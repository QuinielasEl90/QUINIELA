<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinielas El 90</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #ffffff;
            color: #333333;
            font-family: 'Roboto', sans-serif;
            padding-bottom: 20px;
        }
        
        /* COLORES ADAPTADOS A TU LOGO OFICIAL (AZUL MARINO Y DORADO) */
        header {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 18px 10px;
            position: relative;
            border-bottom: 3px solid #d4af37;
        }
        .header-title {
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .header-subtitle {
            font-size: 1.1rem;
            margin-top: 5px;
            color: #d4af37; /* Dorado */
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .header-logo-container {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            background-color: #0b2240;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        /* CONTENEDOR CON TU LOGO COMO MARCA DE AGUA REAL */
        .tabla-contenedor {
            position: relative;
            width: 100%;
            background-color: #ffffff;
            overflow: hidden;
        }
        
        /* Tu logo de fondo difuminado de forma segura */
        .tabla-contenedor::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            opacity: 0.07; /* Ajusta este número si lo quieres más o menos transparente */
            pointer-events: none;
            background-image: url('logo.png'); /* Usa tu archivo local */
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }

        .tabla-quiniela {
            width: 100%;
            border-collapse: collapse;
            position: relative;
            z-index: 1;
        }
        
        .fecha-cabecera {
            background-color: #f1f5f9;
            color: #1e293b;
            font-weight: bold;
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 1px solid #cbd5e1;
            border-top: 1px solid #cbd5e1;
        }

        .fila-partido {
            border-bottom: 1px solid #e2e8f0;
            height: 52px;
        }

        .celda-opc {
            width: 12%;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #475569;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s ease;
        }
        .celda-opc:hover { background-color: #f8fafc; }
        
        /* Color de selección azul rey coordinado */
        .celda-opc.selected {
            background-color: #0b2240 !important;
            color: #d4af37 !important;
            border: 1px solid #d4af37;
        }

        .celda-equipos {
            width: 64%;
            padding: 0 4px;
        }
        .bloque-partido-interno {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.88rem;
        }
        .bloque-equipo {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 44%;
        }
        .bloque-equipo.local { justify-content: flex-start; text-align: left; }
        .bloque-equipo.visita { justify-content: flex-end; text-align: right; }
        
        .equipo-texto {
            font-weight: bold;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Icono de balón integrado */
        .balon-icono-nativo {
            width: 16px;
            height: 16px;
            color: #a0aec0;
            flex-shrink: 0;
        }
        
        .vs-texto {
            width: 12%;
            text-align: center;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .banner-negro {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .banner-negro span { color: #ffcc00; }

        .banner-informes {
            background-color: #ffffff;
            color: #1e293b;
            text-align: center;
            padding: 12px;
            font-size: 1.25rem;
            font-weight: bold;
            border-bottom: 1px solid #e2e8f0;
        }

        .banner-facebook {
            background-color: #0b2240;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-top: 1px solid #d4af37;
        }
        .fb-icono {
            background-color: #ffffff;
            color: #0b2240;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .banner-total {
            text-align: center;
            padding: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1e293b;
        }

        .seccion-inputs {
            padding: 0 12px;
        }
        .input-nombre {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .input-nombre::placeholder { color: #94a3b8; text-transform: none; }

        .bloque-botones-triples {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-accion {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-rojo { background-color: #ff0044; }
        .btn-azul { background-color: #257ae6; }
        .btn-gris { background-color: #434950; }

        .desempate-contenedor {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .desempate-txt {
            font-size: 0.85rem;
            font-weight: bold;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .inputs-goles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .inputs-goles input {
            width: 50px;
            padding: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }

        .btn-whatsapp-enviar {
            width: 100%;
            background-color: #25d366;
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div class="header-title">QUINIELAS EL 90</div>
            <div class="header-subtitle">INAUGURACIÓN</div>
            <div class="header-logo-container">
                <img src="logo.png" class="header-logo-img" alt="Logo El 90">
            </div>
        </header>

        <div class="tabla-contenedor">
            <table class="tabla-quiniela">
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </div>

        <div class="banner-negro">
            <div>PRECIO: <span>GRATIS</span></div>
            <div>CIERRE: <span>JUEVES 11:00 P. M.</span></div>
        </div>

        <div class="banner-informes">
            INFORMES: +52 4439000088
        </div>

        <div class="banner-facebook">
            <span class="fb-icono">f</span> QUINIELAS EL 90
        </div>

        <div class="banner-total">
            TOTAL: $0.00
        </div>

        <div class="seccion-inputs">
            <input type="text" id="nombreParticipante" class="input-nombre" placeholder="NOMBRE DEL PARTICIPANTE">

            <div class="bloque-botones-triples">
                <button type="button" class="btn-accion btn-rojo" onclick="limpiarSelecciones()">Limpiar</button>
                <button type="button" class="btn-accion btn-azul" onclick="verificarRestantes()">Agregar</button>
                <button type="button" class="btn-accion btn-gris" onclick="generarCartillaAzar()">Aleatorio</button>
            </div>

            <div class="desempate-contenedor">
                <div class="desempate-txt">🔥 MARCADOR DESEMPATE: MÉXICO VS GHANA 🔥</div>
                <div class="inputs-goles">
                    <input type="number" id="golesL" min="0" placeholder="0">
                    <span style="font-weight: bold; color: #94a3b8;">-</span>
                    <input type="number" id="golesV" min="0" placeholder="0">
                </div>
            </div>

            <button type="button" class="btn-whatsapp-enviar" onclick="procesarYEnviar()">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.69-4.98c-.202-.101-1.194-.588-1.378-.653-.184-.067-.317-.101-.45.101-.132.202-.51.653-.624.781-.114.128-.23.143-.432.042-.203-.102-.855-.315-1.63-1.002-.604-.539-1.012-1.207-1.13-1.41-.118-.203-.012-.313.089-.415.092-.092.202-.23.302-.346.1-.115.133-.197.2-.328.065-.13.032-.244-.015-.346-.047-.102-.45-1.085-.615-1.482-.162-.389-.34-.337-.466-.343-.119-.006-.255-.006-.39-.006s-.355.05-.54.254c-.186.203-.707.691-.707 1.683 0 .991.72 1.95.819 2.083.1.132 1.411 2.154 3.418 3.017.477.206.85.33 1.142.423.479.153.916.13 1.264.079.388-.058 1.194-.488 1.362-.958.168-.471.168-.874.118-.958-.05-.084-.184-.132-.386-.233z"/>
                </svg>
                Enviar
            </button>
        </div>

    </div>

    <script>
        const partidosData = [
            { tipo: "fecha", texto: "Viernes 22 de Mayo" },
            { id: 1, local: "México", visita: "Ghana" },
            { id: 2, local: "Lens", visita: "Nice" },
            { id: 3, local: "Peñarol", visita: "Corinthians" },
            
            { tipo: "fecha", texto: "Sábado 23 de Mayo" },
            { id: 4, local: "Valencia", visita: "Barcelona" },
            { id: 5, local: "Real Madrid", visita: "Athletic Bilbao" },
            { id: 6, local: "Inter Miami", visita: "Portland" },

            { tipo: "fecha", texto: "Domingo 24 de Mayo" },
            { id: 7, local: "Manchester City", visita: "Aston Villa" },
            { id: 8, local: "Villarreal", visita: "Atlético Madrid" },
            { id: 9, local: "Gran Final", visita: "Liga MX" }
        ];

        const respuestas = {};
        
        const balonSvgHtml = `
            <svg class="balon-icono-nativo" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                <path d="M11.5 5.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0z"/>
            </svg>
        `;

        function inicializarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            tabla.innerHTML = "";

            partidosData.forEach(p => {
                if(p.tipo === "fecha") {
                    const filaFecha = document.createElement('tr');
                    filaFecha.innerHTML = `<td colspan="5" class="fecha-cabecera">${p.texto}</td>`;
                    tabla.appendChild(filaFecha);
                } else {
                    const fila = document.createElement('tr');
                    fila.className = "fila-partido";
                    fila.id = `partido-fila-${p.id}`;
                    fila.innerHTML = `
                        <td class="celda-opc" data-opc="L" onclick="marcarCelda(${p.id}, 'L')">L</td>
                        <td class="celda-equipos">
                            <div class="bloque-partido-interno">
                                <div class="bloque-equipo local">
                                    ${balonSvgHtml}
                                    <span class="equipo-texto">${p.local}</span>
                                </div>
                                <div class="vs-texto">VS</div>
                                <div class="bloque-equipo visita">
                                    <span class="equipo-texto">${p.visita}</span>
                                    ${balonSvgHtml}
                                </div>
                            </div>
                        </td>
                        <td class="celda-opc" data-opc="E" onclick="marcarCelda(${p.id}, 'E')">E</td>
                        <td class="celda-opc" data-opc="V" onclick="marcarCelda(${p.id}, 'V')">V</td>
                    `;
                    tabla.appendChild(fila);
                }
            });
        }

        function marcarCelda(id, opcion) {
            const fila = document.getElementById(`partido-fila-${id}`);
            fila.querySelectorAll('.celda-opc').forEach(c => c.classList.remove('selected'));
            
            const celdaObjetivo = fila.querySelector(`.celda-opc[data-opc="${opcion}"]`);
            celdaObjetivo.classList.add('selected');
            
            respuestas[id] = opcion;
        }

        function limpiarSelecciones() {
            document.querySelectorAll('.celda-opc').forEach(c => c.classList.remove('selected'));
            for (const id in respuestas) { delete respuestas[id]; }
            document.getElementById('golesL').value = "";
            document.getElementById('golesV').value = "";
        }

        function generarCartillaAzar() {
            const opciones = ['L', 'E', 'V'];
            partidosData.forEach(p => {
                if(!p.tipo) {
                    const seleccion = opciones[Math.floor(Math.random() * opciones.length)];
                    marcarCelda(p.id, seleccion);
                }
            });
            document.getElementById('golesL').value = Math.floor(Math.random() * 4);
            document.getElementById('golesV').value = Math.floor(Math.random() * 4);
        }

        function verificarRestantes() {
            const partidosReales = partidosData.filter(p => !p.tipo).length;
            const marcados = Object.keys(respuestas).length;
            alert(`Llevas ${marcados} de ${partidosReales} pronósticos seleccionados.`);
        }

        function procesarYEnviar() {
            const nombre = document.getElementById('nombreParticipante').value.trim();
            const gl = document.getElementById('golesL').value;
            const gv = document.getElementById('golesV').value;
            const partidosReales = partidosData.filter(p => !p.tipo);

            if(!nombre) { alert("Ingresa el NOMBRE DEL PARTICIPANTE por favor."); return; }
            if(Object.keys(respuestas).length < partidosReales.length) { alert("Completa todos los pronósticos de la cartilla."); return; }
            if(gl === "" || gv === "") { alert("Ingresa el marcador de desempate."); return; }

            let textoMensaje = `⚽ *JUGADA: QUINIELAS EL 90* ⚽\n\n👤 *Participante:* ${nombre.toUpperCase()}\n\n📝 *PRONÓSTICOS:*\n`;
            
            partidosReales.forEach(p => {
                textoMensaje += `${p.id}. ${p.local} vs ${p.visita} ➡️ *[ ${respuestas[p.id]} ]*\n`;
            });
            
            textoMensaje += `\n🔥 *Desempate México vs Ghana:* ${gl} - ${gv}`;

            window.open(`https://wa.me/524439000088?text=${encodeURIComponent(textoMensaje)}`, '_blank');
        }

        window.onload = inicializarTabla;
    </script>
</body>
</html>
